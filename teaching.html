    <style>
        /* Shared CSS (Exact match to your existing design) */
        :root { --primary-color: #2c3e50; --secondary-color: #34495e; --accent-color: #3498db; --bg-color: #f8f9fa; --text-color: #333; --border-color: #e0e0e0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 0; color: var(--text-color); background-color: var(--bg-color); }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Navigation */
        .nav-buttons { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; background: white; padding: 15px; border-radius: 10px; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { display: inline-block; padding: 10px 20px; background-color: var(--primary-color); color: white; text-decoration: none; border-radius: 5px; font-weight: bold; transition: background-color 0.3s; }
        .btn:hover, .btn.active { background-color: var(--accent-color); }
        
        /* Content Sections */
        section { background-color: white; padding: 30px 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        section h2 { color: var(--primary-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        h3 { color: var(--secondary-color); margin-top: 25px; margin-bottom: 10px; }
        
        /* Timeline/Course Item Styling */
        .timeline-item { margin-bottom: 20px; padding-left: 15px; border-left: 3px solid var(--accent-color); }
        .timeline-item h4 { margin: 0 0 5px 0; color: var(--primary-color); font-size: 1.2em; }
        .timeline-date { font-size: 0.9em; color: #7f8c8d; font-weight: bold; margin-bottom: 5px; }
        
        footer { text-align: center; padding: 20px; color: #666; margin-top: 40px; border-top: 1px solid var(--border-color); }
        
        @media (max-width: 768px) { .nav-buttons { justify-content: center; } section { padding: 20px; } }
    </style>
</head>
